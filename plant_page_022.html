<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout Page</title>
    <style>
        body {
            /* 90px border all around the page content */
            margin: 0;
            padding: 90px;
            background-color: yellowgreen;
            font-family: sans-serif;
        }

        .container {
            /* We remove the grid from here and apply it to the rows instead */
            max-width: 1200px;
            margin: 0 auto;
        }

        .row {
            display: grid;
            /* First column is 1/6, second is 5/6 */
            grid-template-columns: 1fr 5fr;
            background-color: white;
            /* This creates the border around the entire row */
            border: 2px solid #333;
            margin-bottom: 20px; /* Space between rows */
            overflow: hidden; /* Keeps content inside the border radius if used */
        }

        .text-cell {
            padding: 20px;
            /* Border between the text and the image */
            border-right: 1px solid #ddd;
            display: flex;
            align-items: center;
            font-size: 14px;
            word-break: break-all;
        }

        .image-cell {
            padding: 5px 20px;
            display: flex;
            justify-content: flex-start;
        }

        img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 4px;
        }

        /* Responsive Mobile View */
        @media (max-width: 400px) {
            body {
                padding: 5px;
            }
            .row {
                grid-template-columns: 1fr; /* Stack text under image */
            }
            .text-cell {
                border-right: none;
                border-top: 1px solid #ddd;
                order: 2; /* Text goes second */
            }
            img {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="row">
        <div class="image-cell"><img src="images/northernSpiceBush_buds-flowers.jpg" alt="Bladdernut Image"></div>
        <div class="image-cell"><img src="images/northernSpiceBush_leaves_fruit.jpg" alt="Bladdernut Image"></div>
        <div class="image-cell"><img src="images/northernSpiceBush_m-f_flowers.jpg" alt="Bladdernut Image"></div>            
        <div class="text-cell">Bladdernut</div>
    </div>
    
    <div class="container">
        <div class="row">
            <div class="image-cell"><img src="images/adders_tongue_01.jpg" alt="adders tongue image"></div>
            <div class="image-cell"><img src="images/adders_tongue_02.jpg" alt="adders tongue image"></div>
            <div class="text-cell">Adders Tongue</div>
        </div>

        <div class="row">
            <div class="image-cell"><img src="images/American_Columbo_01.jpg" alt="American Columbo Image"></div>
            <div class="image-cell"><img src="images/American_Columbo_02.jpg" alt="American Columbo Image"></div>
            <div class="image-cell"><img src="images/American_Columbo_03.jpg" alt="American Columbo Image"></div>
            <div class="text-cell">American Columbo</div>
        </div>

        <div class="row">
                <div class="image-cell"><img src="images/Downy_Rattlesnake_Plantain_orchid_01.jpg" alt="Downy Rattlesnake Plantain orchid Image"></div>
            <div class="image-cell"><img src="images/Downy_Rattlesnake_Plantain_orchid_02.jpg" alt="Downy Rattlesnake Plantain orchid Image"></div>
            <div class="text-cell">Downy Rattlesnake Plantain - orchid</div>
        </div>

        <div class="row">
            <div class="image-cell"><img src="images/Redbud_01.jpg" alt="Redbud Image"></div>
            <div class="image-cell"><img src="images/Redbud_02.jpg" alt="Redbud Image"></div>
            <div class="text-cell">Redbud</div>
        </div>

        <div class="row">
            <div class="image-cell"><img src="images/Wild_Ginger_01.jpg" alt="Wild Ginger Image"></div>
            <div class="image-cell"><img src="images/Wild_Ginger_02.jpg" alt="Wild Ginger Image"></div>
            <div class="text-cell">Wild Ginger</div>
        </div>

        <div class="row">
            <div class="image-cell"><img src="images/bladdernut_01.jpg" alt="Bladdernut Image"></div>
            <div class="image-cell"><img src="images/bladdernut_02.jpg" alt="Bladdernut Image"></div>
            <div class="image-cell"><img src="images/bladdernut_03.jpg" alt="Bladdernut Image"></div>            
            <div class="text-cell">Bladdernut</div>
        </div>

    </div>

</body>
</html>
